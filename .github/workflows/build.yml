name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'apps/quarkus-api/**'   # only trigger when app code changes

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: apps/quarkus-api
        run: ./mvnw package -DskipTests=false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/quarkus-api
          file: apps/quarkus-api/src/main/docker/Dockerfile.jvm
          push: true
          tags: ghcr.io/dudziec/quarkus-api:latest