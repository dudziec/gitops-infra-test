apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quarkus-api
  namespace: argocd          # ArgoCD lives here
spec:
  project: default

  source:
    repoURL: https://github.com/dudziec/gitops-infra-test.git
    targetRevision: HEAD      # track the default branch
    path: k8s/quarkus-api    # folder with your manifests

  destination:
    server: https://kubernetes.default.svc   # "this cluster"
    namespace: default        # where to deploy the app

  syncPolicy:
    automated:
      prune: true             # delete resources removed from Git
      selfHeal: true          # revert manual cluster changes
    syncOptions:
      - CreateNamespace=true